name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: swift-format lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app
      - name: Lint
        run: |
          if [ -d AirPass ]; then
            swift-format lint --recursive --strict AirPass AirPassTests
          else
            echo "No Swift sources yet — skipping lint."
          fi

  test:
    name: Build & unit tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app
      - name: Build & test
        run: |
          if [ -d AirPass.xcodeproj ] || [ -d AirPass.xcworkspace ]; then
            xcodebuild test \
              -scheme AirPass \
              -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4)' \
              -only-testing:AirPassTests \
              CODE_SIGNING_ALLOWED=NO | xcbeautify --renderer github-actions
          else
            echo "No Xcode project yet — skipping build."
          fi
        shell: bash
